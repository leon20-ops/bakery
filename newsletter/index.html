<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe | Sweet Crust Bakery</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bakery: { light: '#FDFBF7', dark: '#3A2618', primary: '#E07A5F', accent: '#F2CC8F' } },
                    fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #FDFBF7; }
        .parallax-layer { transition: transform 0.1s ease-out; }
    </style>
</head>
<body class="antialiased h-screen overflow-hidden flex items-center justify-center relative">

    <a href="index.html" class="absolute top-8 left-8 z-50 text-bakery-dark hover:text-bakery-primary font-bold transition flex items-center bg-white px-4 py-2 rounded-full shadow-md">
        <i class="fa-solid fa-arrow-left mr-2"></i> Back
    </a>

    <div class="w-full max-w-6xl h-[85vh] bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row m-4 relative z-10">
        
        <!-- Left Side: Interactive Graphic -->
        <div class="hidden md:flex w-1/2 bg-bakery-accent/30 relative items-center justify-center overflow-hidden" id="parallax-container">
            <!-- Background Image -->
            <img src="https://images.unsplash.com/photo-1555507036-ab1e4006a280?auto=format&fit=crop&w=1000&q=80" alt="Bakery" class="absolute inset-0 w-full h-full object-cover opacity-40">
            
            <!-- Floating Elements (React to mouse) -->
            <div class="parallax-layer absolute w-32 h-32 bg-bakery-primary rounded-full blur-2xl opacity-50" data-speed="0.05" style="top: 20%; left: 20%;"></div>
            <div class="parallax-layer absolute w-48 h-48 bg-bakery-dark rounded-full blur-2xl opacity-20" data-speed="-0.08" style="bottom: 10%; right: 10%;"></div>
            
            <!-- Text Content -->
            <div class="relative z-10 text-center p-12 parallax-layer" data-speed="0.03">
                <i class="fa-solid fa-envelope-open-text text-6xl text-bakery-primary mb-6"></i>
                <h2 class="text-5xl font-serif font-bold text-bakery-dark mb-4">Join Our Sweet Community</h2>
                <p class="text-lg text-gray-800 font-medium">Get VIP access to limited-time pastries, baking tips, and 15% off your first online order.</p>
            </div>
        </div>

        <!-- Right Side: Form -->
        <div class="w-full md:w-1/2 p-8 md:p-16 flex flex-col justify-center bg-white">
            <div class="mb-10 text-center md:text-left">
                <i class="fa-solid fa-wheat-awn text-3xl text-bakery-primary mb-4"></i>
                <h3 class="text-3xl font-serif font-bold text-bakery-dark mb-2">Subscribe to the Oven</h3>
                <p class="text-gray-500">We promise not to spam you. Only sweet stuff.</p>
            </div>

            <form class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                    <input type="text" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-bakery-primary focus:border-transparent transition" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <input type="email" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-bakery-primary focus:border-transparent transition" placeholder="john@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Favorite Treat? (Optional)</label>
                    <select class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-bakery-primary focus:border-transparent transition">
                        <option>Bread</option>
                        <option>Cakes</option>
                        <option>Pastries</option>
                        <option>Cookies</option>
                    </select>
                </div>
                
                <button type="button" class="w-full bg-bakery-dark text-white py-4 rounded-xl text-lg font-bold hover:bg-bakery-primary transition shadow-lg mt-4 transform hover:-translate-y-1">
                    Sign Me Up
                </button>
                <p class="text-xs text-center text-gray-400 mt-4">By subscribing, you agree to our Terms & Privacy Policy.</p>
            </form>
        </div>
    </div>

    <!-- Mousemove Parallax Script -->
    <script>
        const container = document.getElementById('parallax-container');
        const layers = document.querySelectorAll('.parallax-layer');

        if(container) {
            container.addEventListener('mousemove', (e) => {
                const rect = container.getBoundingClientRect();
                const x = e.clientX - rect.left - (rect.width / 2);
                const y = e.clientY - rect.top - (rect.height / 2);

                layers.forEach(layer => {
                    const speed = layer.getAttribute('data-speed');
                    const xOffset = x * speed;
                    const yOffset = y * speed;
                    layer.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
                });
            });

            // Reset on mouse leave
            container.addEventListener('mouseleave', () => {
                layers.forEach(layer => {
                    layer.style.transform = `translate(0px, 0px)`;
                });
            });
        }
    </script>
</body>
</html>
